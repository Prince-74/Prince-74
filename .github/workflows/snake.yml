name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Prince-74
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Setup Git config
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Create and switch to output branch
        run: |
          git fetch origin
          git checkout -b output origin/output 2>/dev/null || git checkout --orphan output
          if [ -z "$(git ls-files)" ]; then
            touch .gitkeep
            git add .gitkeep
            git commit -m "Initial commit"
          fi

      - name: Copy and commit snake animation
        run: |
          mkdir -p .
          cp dist/github-contribution-grid-snake-dark.svg github-contribution-grid-snake-dark.svg
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg
          git add github-contribution-grid-snake*.svg
          git commit -m "Update snake animation" || echo "No changes"
          git push -u origin output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
