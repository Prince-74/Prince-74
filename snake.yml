name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Push Snake Animation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Prince-74
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Setup Git
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Create output branch if needed
        run: |
          if ! git rev-parse --verify output 2>/dev/null; then
            git checkout --orphan output
            git rm -rf .
            touch .gitkeep
            git add .gitkeep
            git commit -m "Initial commit for output branch"
          fi

      - name: Switch to output branch and commit
        run: |
          git checkout output
          mkdir -p .
          cp dist/github-contribution-grid-snake-dark.svg github-contribution-grid-snake-dark.svg
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg
          git add github-contribution-grid-snake*.svg
          git commit -m "Update snake animation" || echo "No changes to commit"
          git push -u origin output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
